        →: |
          '.vu-bottom-pill-wrap {
            position: fixed;
            bottom: calc(16px + env(safe-area-inset-bottom, 0px));
            left: 50%;
            transform: translateX(-50%);
            width: min(90%, 420px);
            max-width: calc(100vw - 32px);
            z-index: 60;
            pointer-events: none;
            box-sizing: border-box;
          }
          .vu-bottom-pill {
            pointer-events: auto;
            background: #1c1c1e;
            border-radius: 999px;
            padding: 8px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            min-height: 56px;
          }
          .vu-pill-btn {
            flex: 1;
            border: none;
            background: transparent;
            color: #94a3b8;
            padding: 12px;
            min-height: 44px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
          }
          .vu-pill-btn--active { color: #fff; }
          .vu-pill-btn ion-icon { font-size: 22px; }
          .vu-pill-fab {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #0050AA;
            color: #fff;
            border: 4px solid #f8f9fa;
            margin-top: -32px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,80,170,0.4);
            cursor: pointer;
            flex: 0 0 auto;
          }
          .vu-pill-fab ion-icon { font-size: 24px; }
          @media (min-width: 768px) {
            .vu-bottom-pill-wrap {
              width: min(90%, 520px);
            }
          }
          @media (min-width: 1024px) {
            .vu-bottom-pill-wrap {
              width: min(520px, 42vw);
              max-width: 1200px;
            }
          }
          '