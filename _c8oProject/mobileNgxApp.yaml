          '// Ionic Variables and Theming. For more info, please see:
          // http://ionicframework.com/docs/theming/
          
          /** Ionic CSS Variables **/
          
          /** version 8.4.0.7 **/
          
          /* tw-ionic.css
             Tailwind-ish theme overlay for Ionic (v6/v7+)
             Usage: import this file AFTER Ionic core + theme variables.
          */
          
          /* -------------------------------------------------------
             1) Base tokens (Tailwind-ish)
          -------------------------------------------------------- */
          :root {
            /* Typography */
            --tw-font-sans: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system,
                "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans",
                "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
          
            --tw-text-xs: 0.75rem;
            --tw-text-sm: 0.875rem;
            --tw-text-base: 1rem;
            --tw-text-lg: 1.125rem;
          
            --tw-leading-tight: 1.25;
            --tw-leading-normal: 1.5;
          
            /* Radii */
            --tw-radius-sm: 0.5rem;   /* ~rounded-lg */
            --tw-radius-md: 0.75rem;  /* ~rounded-xl */
            --tw-radius-lg: 1rem;     /* ~rounded-2xl */
          
            /* Shadows */
            --tw-shadow-sm: 0 1px 2px rgba(0,0,0,.06);
            --tw-shadow-md: 0 6px 18px rgba(0,0,0,.10);
            --tw-shadow-lg: 0 12px 30px rgba(0,0,0,.14);
          
            /* Spacing (used as generic paddings) */
            --tw-pad-x: 1rem;   /* px-4 */
            --tw-pad-y: 0.75rem;/* py-3 */
          
            /* Color tokens mapped to Ionic color palette */
            --tw-bg: var(--ion-background-color, #ffffff);
            --tw-surface: var(--ion-card-background, var(--ion-item-background, #ffffff));
            --tw-surface-2: color-mix(in srgb, var(--tw-surface) 88%, var(--ion-background-color, #ffffff));
            --tw-border: var(--ion-border-color, #d7d8da);
            --tw-text: var(--ion-text-color, #0f172a);
            --tw-text-muted: var(--ion-color-medium, #6b7280);
          
            --tw-primary: var(--ion-color-primary, #3880ff);
            --tw-primary-contrast: var(--ion-color-primary-contrast, #ffffff);
            --tw-success: var(--ion-color-success, #2dd36f);
            --tw-warning: var(--ion-color-warning, #ffc409);
            --tw-danger: var(--ion-color-danger, #eb445a);
          
            /* Focus ring */
            --tw-ring: 0 0 0 3px rgba(var(--ion-color-primary-rgb, 56, 128, 255), .25);
          }
          
          /* Manual light mode from toolbar toggle */
          :root.force-light {
            --tw-shadow-sm: 0 1px 2px rgba(0,0,0,.06);
            --tw-shadow-md: 0 6px 18px rgba(0,0,0,.10);
            --tw-shadow-lg: 0 12px 30px rgba(0,0,0,.14);
          
            --tw-ring: 0 0 0 3px rgba(var(--ion-color-primary-rgb, 56, 128, 255), .25);
            color-scheme: light;
          }
          
          :root.force-dark {
            --tw-shadow-sm: 0 1px 2px rgba(0,0,0,.35);
            --tw-shadow-md: 0 8px 20px rgba(0,0,0,.45);
            --tw-shadow-lg: 0 16px 40px rgba(0,0,0,.55);
          
            --tw-ring: 0 0 0 3px rgba(var(--ion-color-primary-rgb, 66,140,255), .28);
            color-scheme: dark;
          }
          
          /* -------------------------------------------------------
             2) Map non-color tokens to Ionic CSS variables
          -------------------------------------------------------- */
          :root {
            --ion-font-family: var(--tw-font-sans);
            --ion-border-radius: var(--tw-radius-md);
          }
          
          /* -------------------------------------------------------
             3) Global base polish
          -------------------------------------------------------- */
          html, body {
            font-family: var(--tw-font-sans);
            color: var(--tw-text);
            background: var(--tw-bg);
          }
          
          ion-app, ion-content {
            --background: var(--tw-bg);
          }
          
          /* Make default text feel like Tailwind */
          ion-text, ion-label, p, span, div {
            letter-spacing: -0.01em;
            line-height: var(--tw-leading-normal);
          }
          
          /* -------------------------------------------------------
             4) Buttons (ion-button)
          -------------------------------------------------------- */
          ion-button {
            --border-radius: var(--tw-radius-sm);
            --box-shadow: var(--tw-shadow-sm);
            text-transform: none;
            font-weight: 600;
            letter-spacing: -0.01em;
          }
          
          ion-button::part(native) {
            padding: 0.65rem 1rem; /* tailwind-ish */
          }
          
          /* Outline buttons look cleaner */
          ion-button[fill="outline"] {
            --border-width: 1px;
            --border-color: var(--tw-border);
            --color: var(--tw-text);
            --background: transparent;
            --box-shadow: none;
          }
          
          /* Clear buttons */
          ion-button[fill="clear"] {
            --color: var(--tw-text);
            --background: transparent;
            --box-shadow: none;
          }
          
          /* -------------------------------------------------------
             5) Inputs (ion-input / ion-textarea / ion-select)
          -------------------------------------------------------- */
          ion-item {
            --inner-padding-end: 0px;
            --inner-padding-start: 0px;
            --padding-start: 0px;
            --padding-end: 0px;
            --min-height: auto;
            --background: transparent;
            --inner-border-width: 0;
            --border-width: 0;
            --inner-box-shadow: none;
          }
          
          /* Wrap inputs in a "field" look */
          ion-input, ion-textarea, ion-select, ion-datetime {
            --padding-start: 0px;
          }
          
          /* Use ion-item as container: add a Tailwind-like field style */
          ion-item {
            border: 1px solid var(--tw-border);
            border-radius: var(--tw-radius-sm);
            padding: 0.25rem 0.75rem;
            background: var(--tw-surface);
            box-shadow: var(--tw-shadow-sm);
            margin: 0.5rem 0;
          }
          
          /* Labels */
          ion-item ion-label {
            font-size: var(--tw-text-sm);
            color: var(--tw-text-muted);
            margin-bottom: 0.25rem;
          }
          
          /* Actual input text */
          ion-input, ion-textarea, ion-select {
            font-size: var(--tw-text-base);
            color: var(--tw-text);
          }
          
          /* Signature component defaults */
          c8o-signature,
          ion-item c8o-signature {
            display: block;
            width: 100%;
            max-width: 100%;
            flex: 1 1 auto;
          }
          
          c8o-signature .signature-pad {
            --tw-signature-shell: color-mix(in srgb, var(--tw-surface-2) 80%, var(--tw-surface) 20%);
            --tw-signature-board: color-mix(in srgb, var(--tw-surface) 88%, var(--tw-bg) 12%);
            --tw-signature-border: color-mix(in srgb, var(--tw-border) 86%, transparent);
            width: 100% !important;
            max-width: none !important;
            height: auto !important;
            max-height: none !important;
            box-sizing: border-box;
            margin-top: 0.75rem;
            padding: 0.5rem;
            border: 1px solid var(--tw-signature-border) !important;
            border-radius: var(--tw-radius-md);
            background: var(--tw-signature-shell) !important;
            box-shadow: var(--tw-shadow-sm) !important;
          }
          
          c8o-signature .signature-pad--body {
            width: 100%;
            min-height: 220px;
            border-radius: var(--tw-radius-md);
            overflow: hidden;
            background: var(--tw-signature-board) !important;
            border: 1px solid var(--tw-signature-border) !important;
            box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--tw-signature-border) 78%, var(--tw-text) 22%);
          }
          
          c8o-signature canvas {
            display: block;
            width: auto !important;
            height: 220px !important;
            max-width: none;
            background: transparent;
          }
          
          :root.force-dark c8o-signature canvas {
            filter: invert(1) hue-rotate(180deg);
          }
          
          :root.force-light c8o-signature canvas {
            filter: none;
          }
          
          c8o-signature .signature-pad--icon-bar {
            width: 100%;
            overflow: hidden !important;
            display: flex;
            gap: 0.5rem;
            margin-top: 0.6rem;
            padding: 0.15rem;
            border-radius: var(--tw-radius-sm);
            background: var(--tw-signature-shell) !important;
          }
          
          c8o-signature .signature-pad--icon-bar ion-button {
