        	private initVuApp(): void {
        			const app: any = this;
        			const store = app.getInterviewStore();
        			app.global.startSpeechListening = (p: any) => app.startSpeechListening(p);
        			app.global.stopSpeechListening = (p: any) => app.stopSpeechListening(p);
        			// Exposer le store tout de suite (comme VoxUrssaf V1) — le pull FullSync reste async
        			app.global.interviewStore = store;
        			if (app.router && app.router.sharedObject) {
        				app.router.sharedObject.interviewStore = store;
        				if (app.router.sharedObject.global) {
        					app.router.sharedObject.global.interviewStore = store;
        				}
        			}
        			if (store._ready) { return; }
        			store._ready = store.initWithPage(app).then(() => {
        				app.global.investigatorName = store.getInvestigatorName();
        				app.global.speechLocale = store.getSpeechLocale();
        			}).catch((e: any) => {
        				app.c8o.log.error("[VoxUrssafV2] init FullSync store", e);
        			});
        		}
        	
        		public async ensureInterviewStore(page?: any): Promise<any> {
        			this.initVuApp();
        			const store = this.getInterviewStore();
        			if (page && store) { store._page = page; }
        			else if (store && !store._page) { store._page = this; }
        			if (store && store.whenReady) { await store.whenReady(); }
        			return store;
        		}
        	
        		public wizardPageUrl(pageName: string): string {
        			const pages = (this.routerProvider && this.routerProvider.pagesArray)
        				? this.routerProvider.pagesArray : [];
        			for (let i = 0; i < pages.length; i++) {
        				if (pages[i].name === pageName) { return pages[i].url || "/"; }
        			}
        			const fallback: any = {
        				"Page": "/",
        				"InterviewStep1": "/interview-step-1",
        				"InterviewStep2": "/interview-step-2",
        				"InterviewStepVerbatim": "/interview-step-verbatim",
        				"InterviewStep3": "/interview-step-3",
        				"InterviewStep4": "/interview-step-4",
        				"InterviewRecap": "/interview-recap"
        			};
        			return fallback[pageName] || "/";
        		}
        	
        		public wizardNavigate(page: any, pageName: string): Promise<any> {
        			const url = this.wizardPageUrl(pageName);
        			if (page && page.angularRouter) {
        				return page.angularRouter.navigate([url]);
        			}
        			const navController = page.getInstance(NavController);
        			return navController.navigateForward(url);
        		}
        	
        		public wizardBack(page: any): Promise<any> {
        			if (page && page.angularRouter) {
        				return page.angularRouter.navigateBack();
        			}
        			const navController = page.getInstance(NavController);
        			return navController.navigateBack();
        		}
        	
        		public wizardHome(page: any): Promise<any> {
        			const url = this.wizardPageUrl("Page");
        			if (page && page.angularRouter) {
        				return page.angularRouter.navigate([url]);
        			}
        			const navController = page.getInstance(NavController);
        			return navController.navigateRoot(url);
        		}
        	
        		public getInterviewStore(): any {
        			const app: any = this;
        			if (!app._interviewStore) {
        				const self = app;
        				app._interviewStore = {
        					FS_DB: "voxurssafv2_fullsync",
        					LEGACY_KEY: "voxurssaf_v2_data",
        					CACHE_LS_KEY: "voxurssaf_v2_offline_cache",
        					DEVICE_LS_KEY: "voxurssaf_v2_device_id",
        					INTERVIEWS_LS_KEY: "voxurssaf_v2_interview_ids",
        					_cache: null as any,
        					_ready: null as Promise<void> | null,
        					_page: null as any,
        					_saveQueue: null as Promise<void> | null,
        					_recapViewId: null as string | null,
        	
        					init() { /* compat — init réel via initWithPage */ },
        	
        					whenReady(): Promise<void> {
        						return this._ready || Promise.resolve();
        					},
        	
        					async initWithPage(page: any): Promise<void> {
        						this._page = page;
        						await page.c8o.finalizeInit();
        						this.hydrateFromLocalSnapshot();
        						await this.migrateLegacyIfNeeded(page);
        						await this.reloadCache(page);
        						// Pas de pull/push au démarrage : évite _bulk_docs anonymous si CouchDB/Convertigo pas republié.
        						// Utiliser le bouton « Synchroniser » sur l''accueil quand le serveur est prêt.
        					},
        	
        					async pullFromServer(page: any): Promise<void> {
        						await page.c8o.finalizeInit();
        						await this.fsPull(page);
        						await this.reloadCache(page);
        					},
        	
        					async pushToServer(page: any): Promise<void> {
        						await page.c8o.finalizeInit();
        						await this.fsPush(page);
        					},
        	
        					rememberDeviceId(deviceId: string) {
        						if (!deviceId) { return; }
        						try { localStorage.setItem(this.DEVICE_LS_KEY, deviceId); } catch (e) { /* ignore */ }
        					},
        	
        					readDeviceIdFromLocal(): string | null {
        						try {
        							const id = localStorage.getItem(this.DEVICE_LS_KEY);
        							return (id && id.trim()) ? id.trim() : null;
        						} catch (e) { return null; }
        					},
        	
        					rememberInterviewId(id: string) {
        						if (!id) { return; }
        						try {
        							const raw = localStorage.getItem(this.INTERVIEWS_LS_KEY);
        							const ids: string[] = raw ? JSON.parse(raw) : [];
        							if (ids.indexOf(id) < 0) { ids.push(id); }
        							localStorage.setItem(this.INTERVIEWS_LS_KEY, JSON.stringify(ids));
        						} catch (e) { /* ignore */ }
        					},
        	
        					hydrateFromLocalSnapshot(): boolean {
        						const snap = this.loadLocalSnapshot();
        						if (!snap || !Array.isArray(snap.interviews) || snap.interviews.length === 0) {
        							return false;
        						}
        						const empty = this.getEmptyData();
        						const deviceId = snap.deviceId || this.readDeviceIdFromLocal() || empty.deviceId;
        						this.rememberDeviceId(deviceId);
        						this._cache = {
        							deviceId: deviceId,
        							eventId: snap.eventId || empty.eventId,
        							investigatorName: snap.investigatorName || empty.investigatorName,
        							speechLocale: snap.speechLocale || empty.speechLocale,
        							questions: (snap.questions || []).slice(),
        							interviews: snap.interviews.map((iv: any) => Object.assign({}, iv)),
        							activeInterviewId: snap.activeInterviewId || null
        						};
        						return true;
        					},
        	
        					saveLocalSnapshot() {
        						try {
        							const c = this.ensureCache();
        							const prev = this.loadLocalSnapshot();
        							if ((c.interviews || []).length === 0 && prev && (prev.interviews || []).length > 0) {
        								return;
        							}
        							const interviews = (c.interviews || []).map((iv: any) => {
        								const copy = Object.assign({}, iv);
        								if (copy.entries) { copy.entries = copy.entries.slice(); }
        								if (copy.journeySteps) { copy.journeySteps = copy.journeySteps.slice(); }
        								if (copy.photoDataUrl && copy.photoDataUrl.length > 120000) {
        									copy._photoOmitted = true;
        									delete copy.photoDataUrl;
        								}
        								return copy;
        							});
        							localStorage.setItem(this.CACHE_LS_KEY, JSON.stringify({
        								deviceId: c.deviceId,
        								eventId: c.eventId,
        								investigatorName: c.investigatorName,
        								speechLocale: c.speechLocale,
        								questions: (c.questions || []).slice(),
        								interviews: interviews,
        								activeInterviewId: c.activeInterviewId,
        								savedAt: new Date().toISOString()
        							}));
        							this.rememberDeviceId(c.deviceId);
        							for (const iv of interviews) {
        								if (iv && iv.interviewId) { this.rememberInterviewId(iv.interviewId); }
        							}
        						} catch (e) {
        							const p = this._page;
        							if (p) { try { p.c8o.log.warn("[VoxUrssafV2] saveLocalSnapshot", e); } catch (e2) { /* ignore */ } }
        						}
        					},
        	
        					loadLocalSnapshot(): any {
        						try {
        							const raw = localStorage.getItem(this.CACHE_LS_KEY);
        							return raw ? JSON.parse(raw) : null;
        						} catch (e) { return null; }
        					},
        	
        					countPendingSync(): number {
        						return (this.load().interviews || []).filter((iv: any) =>
        							iv.status === "saved" || iv.status === "error").length;
        					},
        	
        					async loadInterviewsFallback(page: any, deviceId: string): Promise<any[]> {
        						const interviews: any[] = [];
        						let ids: string[] = [];
        						try {
        							const raw = localStorage.getItem(this.INTERVIEWS_LS_KEY);
        							ids = raw ? JSON.parse(raw) : [];
        						} catch (e) { ids = []; }
        						for (const id of ids) {
        							if (!id) { continue; }
        							try {
        								const doc = await this.fsGet(page, this.interviewDocId(id));
        								if (doc) {
        									const iv = this.docToInterview(doc);
        									if (iv) { interviews.push(iv); }
        								}
        							} catch (e) { /* skip */ }
        						}
        						return interviews;
        					},
        	
        					newId() {
        						return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, (c) => {
        							const r = Math.random() * 16 | 0;
        							const v = c === "x" ? r : (r & 0x3 | 0x8);
        							return v.toString(16);
        						});
        					},
        	
        					formatDate(iso: string) {
        						if (!iso) { return ""; }
        						const d = new Date(iso);
        						return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
        					},
        	
        					formatSqlTimestamp(iso: string) {
        						if (!iso) {
        							return new Date().toISOString().replace("T", " ").replace("Z", "").substring(0, 19);
        						}
        						return String(iso).replace("T", " ").replace("Z", "").substring(0, 19);
        					},
        	
        					formatSyncError(e: any, step?: string): string {
        						const parts: string[] = [];
        						if (step) { parts.push("[" + step + "]"); }
        						const inner = (e && e.__inner) ? e.__inner : e;
        						const push = (v: any) => {
        							if (v == null || v === undefined) { return; }
        							let s = "";
        							if (typeof v === "string") { s = v.trim(); }
        							else if (v.message) { s = String(v.message).trim(); }
        							else if (v.errorMessage) { s = String(v.errorMessage).trim(); }
        							else if (v.ErrorMessage) { s = String(v.ErrorMessage).trim(); }
        							else {
        								try { s = JSON.stringify(v); } catch (e2) { s = String(v); }
        							}
        							if (s && parts.indexOf(s) < 0) { parts.push(s); }
        						};
        						push(e && e.message);
        						push(inner && inner.message);
        						push(inner && inner.error);
        						push(inner && inner.data);
        						push(inner && inner.body);
        						if (inner && inner.document) {
        							push(inner.document.error);
        							push(inner.document.message);
        						}
        						if (inner && inner.stack && parts.length < 3) {
        							const st = String(inner.stack).split("\n")[0];
        							if (st) { parts.push(st); }
        						}
        						if (parts.length <= (step ? 1 : 0)) {
        							try {
        								const j = JSON.stringify(inner || e);
        								if (j && j !== "{}" && j.length < 800) { parts.push(j); }
        							} catch (e3) { push(String(inner || e)); }
        						}
        						return parts.join(" — ").substring(0, 480);
        					},
        	
        					callSequence(page: any, requestable: string, params?: any): Promise<any> {
        						if (!params || typeof params !== "object") {
        							return page.c8o.callJson(requestable);
        						}
        						return page.c8o.callJsonObject(requestable, params);
        					},
        	
        					async ensureSqlSchema(page: any): Promise<void> {
        						await this.callSequence(page, "VoxUrssafV2.Interview_EnsureSchema");
        					},
        	
        					getEmptyData() {
        						return {
        							deviceId: this.newId(),
        							eventId: "salon-externe-2026",
        							investigatorName: "Enquêteur Terrain",
        							speechLocale: "fr-FR",
        							questions: [
        								"Général / Contexte",
        								"Quels sont vos principaux défis actuels ?",
        								"Comment utilisez-vous notre produit/service ?",
        								"Qu''est-ce qui vous manque le plus aujourd''hui ?",
        								"Quel est votre retour sur l''événement ?"
        							],
        							interviews: [] as any[],
        							activeInterviewId: null as string | null
        						};
        					},
        	
        					ensureCache() {
        						if (!this._cache) { this._cache = this.getEmptyData(); }
        						return this._cache;
        					},
        	
        					load() { return this.ensureCache(); },
        	
        					configDocId(deviceId: string) { return "config:" + deviceId; },
        	
        					interviewDocId(id: string) { return "interview:" + id; },
        	
        					async fsGet(page: any, docid: string): Promise<any> {
        						await page.c8o.finalizeInit();
        						return page.c8o.callJsonObject("fs://" + this.FS_DB + ".get", { docid: docid }).async();
        					},
        	
        					async fsPost(page: any, doc: any): Promise<any> {
        						await page.c8o.finalizeInit();
        						const body = Object.assign({}, doc, { _use_policy: "override" });
        						return page.c8o.callJsonObject("fs://" + this.FS_DB + ".post", body).async();
        					},
        	
        					async fsPostSafe(page: any, doc: any): Promise<any> {
        						try {
        							return await this.fsPost(page, doc);
        						} catch (e: any) {
        							const status = e && e.status;
        							const name = e && e.name;
        							const msg = (e && e.message) ? e.message : String(e);
        							const conflict = status === 409 || name === "conflict" || msg.indexOf("conflict") >= 0;
        							if (!conflict || !doc || !doc._id) { throw e; }
        							try {
        								const cur = await this.fsGet(page, doc._id);
        								if (cur && cur._rev) {
        									const merged = Object.assign({}, cur, doc, { _rev: cur._rev });
        									return await this.fsPost(page, merged);
        								}
        							} catch (e2) { /* retry */ }
        							return await this.fsPost(page, doc);
        						}
        					},
        	
        					enqueuePersist(page: any, task: () => Promise<void>): Promise<void> {
        						const p = page || this._page;
        						if (!p) {
        							try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        							return Promise.resolve();
        						}
        						const run = () => task().catch((err: any) => {
        							try { p.c8o.log.warn("[VoxUrssafV2] persist error", err); } catch (e) { /* ignore */ }
        						}).finally(() => {
        							try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        						});
        						this._saveQueue = (this._saveQueue || Promise.resolve()).then(run);
        						return this._saveQueue;
        					},
        	
        					flushPersist(): Promise<void> {
        						return this._saveQueue || Promise.resolve();
        					},
        	
        					async fsView(page: any, view: string, key: string): Promise<any> {
        						await page.c8o.finalizeInit();
        						return page.c8o.callJsonObject("fs://" + this.FS_DB + ".view", {
        							ddoc: "vu", view: view, key: key, include_docs: false
        						}).async();
        					},
        	
        					async fsPull(page: any): Promise<any> {
        						await page.c8o.finalizeInit();
        						return page.c8o.callJsonObject("fs://" + this.FS_DB + ".replicate_pull", {
        							continuous: false, retry: false, heartbeat: 10000, timeout: false
        						}).async();
        					},
        	
        					async fsPush(page: any): Promise<any> {
        						await page.c8o.finalizeInit();
        						return page.c8o.callJsonObject("fs://" + this.FS_DB + ".replicate_push", {
        							continuous: false, retry: false, heartbeat: 10000, timeout: false
        						}).async();
        					},
        	
        					emptySalonFields(): any {
        						const data = this.load();
        						const eventId = data.eventId || "salon-externe-2026";
        						const d = new Date();
        						const pad = (n: number) => n < 10 ? ''0'' + n : n;
        						const dateStr = pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + "/" + d.getFullYear() + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
        						return {
        							format: "salon",
        							sheetCode: "F-" + dateStr + " - " + eventId,
        							journeySteps: [] as string[],
        							globalSatisfaction: "",
        							verbatimText: "",
        							sector: "",
        							age: "",
        							urssafSince: "",
        							multiProfile: null as boolean | null,
        							profileCount: "",
        							contactMode: "",
        							consentAccepted: false,
        							recontactOk: false,
        							firstName: "",
        							photoDataUrl: "",
        							wizardStep: 1
        						};
        					},
        	
        					docToInterview(doc: any): any {
        						if (!doc) { return null; }
        						const base: any = {
        							interviewId: doc.interviewId,
        							status: doc.status || "draft",
        							createdAt: doc.createdAt,
        							updatedAt: doc.updatedAt,
        							syncedAt: doc.syncedAt,
        							syncError: doc.syncError,
        							intervieweeName: doc.intervieweeName,
        							intervieweeRole: doc.intervieweeRole,
        							intervieweeCompany: doc.intervieweeCompany,
        							intervieweeEmail: doc.intervieweeEmail,
        							context: doc.context,
        							entries: (doc.entries || []).slice()
        						};
        						if (doc.format === "salon") {
        							Object.assign(base, {
        								format: "salon",
        								sheetCode: doc.sheetCode || "",
        								journeySteps: (doc.journeySteps || []).slice(),
        								globalSatisfaction: doc.globalSatisfaction || "",
        								verbatimText: doc.verbatimText || "",
        								sector: doc.sector || "",
        								age: doc.age || "",
        								urssafSince: doc.urssafSince || "",
        								multiProfile: doc.multiProfile,
        								profileCount: doc.profileCount || "",
        								contactMode: doc.contactMode || "",
        								consentAccepted: !!doc.consentAccepted,
        								recontactOk: !!doc.recontactOk,
        								firstName: doc.firstName || "",
        								photoDataUrl: doc.photoDataUrl || "",
        								wizardStep: doc.wizardStep || 1
        							});
        						}
        						return base;
        					},
        	
        					interviewToDoc(iv: any, deviceId: string, eventId: string): any {
        						const doc: any = {
        							_id: this.interviewDocId(iv.interviewId),
        							type: "interview",
        							c8oGrp: deviceId,
        							deviceId: deviceId,
        							eventId: eventId,
        							interviewId: iv.interviewId,
        							status: iv.status || "draft",
        							createdAt: iv.createdAt,
        							updatedAt: iv.updatedAt,
        							syncedAt: iv.syncedAt || null,
        							syncError: iv.syncError || null,
        							intervieweeName: iv.intervieweeName,
        							intervieweeRole: iv.intervieweeRole,
        							intervieweeCompany: iv.intervieweeCompany,
        							intervieweeEmail: iv.intervieweeEmail,
        							context: iv.context,
        							entries: iv.entries || []
        						};
        						if (iv.format === "salon") {
        							Object.assign(doc, {
        								format: "salon",
        								sheetCode: iv.sheetCode || "",
        								journeySteps: iv.journeySteps || [],
        								globalSatisfaction: iv.globalSatisfaction || "",
        								verbatimText: iv.verbatimText || "",
        								sector: iv.sector || "",
        								age: iv.age || "",
        								urssafSince: iv.urssafSince || "",
        								multiProfile: iv.multiProfile,
        								profileCount: iv.profileCount || "",
        								contactMode: iv.contactMode || "",
        								consentAccepted: !!iv.consentAccepted,
        								recontactOk: !!iv.recontactOk,
        								firstName: iv.firstName || "",
        								photoDataUrl: iv.photoDataUrl || "",
        								wizardStep: iv.wizardStep || 1
        							});
        						}
        						return doc;
        					},
        	
        					async persistConfig(page: any): Promise<void> {
        						const c = this.ensureCache();
        						await this.fsPostSafe(page, {
        							_id: this.configDocId(c.deviceId),
        							type: "config",
        							deviceId: c.deviceId,
        							eventId: c.eventId,
        							investigatorName: c.investigatorName,
        							speechLocale: c.speechLocale,
        							questions: c.questions || [],
        							activeInterviewId: c.activeInterviewId
        						});
        					},
        	
        					async persistInterview(page: any, iv: any): Promise<void> {
        						const c = this.ensureCache();
        						await this.fsPostSafe(page, this.interviewToDoc(iv, c.deviceId, c.eventId));
        						if (iv && iv.interviewId) { this.rememberInterviewId(iv.interviewId); }
        					},
        	
        					async persistAllInterviews(page: any): Promise<void> {
        						const c = this.ensureCache();
        						for (const iv of (c.interviews || [])) {
        							await this.persistInterview(page, iv);
        						}
        					},
        	
        					persistActiveOnly(page?: any) {
        						const p = page || this._page;
        						if (!p) { return; }
        						const iv = this.getActiveInterview();
        						this.enqueuePersist(p, async () => {
        							await this.persistConfig(p);
        							if (iv) { await this.persistInterview(p, iv); }
        						});
        					},
        	
        					persistAllNow(page?: any): Promise<void> {
        						const p = page || this._page;
        						if (!p) { return Promise.resolve(); }
        						return this.enqueuePersist(p, async () => {
        							await this.persistConfig(p);
        							await this.persistAllInterviews(p);
        						});
        					},
        	
        					persistConfigOnly(page?: any) {
        						const p = page || this._page;
        						if (!p) { return; }
        						this.enqueuePersist(p, async () => { await this.persistConfig(p); });
        					},
        	
        					async save(page: any): Promise<void> {
        						await this.persistConfig(page);
        						const c = this.ensureCache();
        						for (const iv of (c.interviews || [])) {
        							await this.persistInterview(page, iv);
        						}
        					},
        	
        					saveSync(page: any) {
        						const p = page || this._page;
        						if (!p) { return; }
        						this.enqueuePersist(p, async () => {
        							await this.persistConfig(p);
        							const c = this.ensureCache();
        							for (const iv of (c.interviews || [])) {
        								await this.persistInterview(p, iv);
        							}
        						});
        					},
        	
        					mergeInterviewsById(target: any[], source: any[]): any[] {
        						const out = (target || []).slice();
        						for (const mem of (source || [])) {
        							if (!mem || !mem.interviewId) { continue; }
        							const idx = out.findIndex((x: any) => x.interviewId === mem.interviewId);
        							if (idx < 0) {
        								out.push(mem);
        							} else {
        								const a = mem.updatedAt || mem.createdAt || "";
        								const b = out[idx].updatedAt || out[idx].createdAt || "";
        								if (a >= b) { out[idx] = mem; }
        							}
        						}
        						return out;
        					},
        	
        					async reloadCache(page: any): Promise<void> {
        						const memoryInterviews = (this._cache && this._cache.interviews)
        							? this._cache.interviews.slice() : [];
        						const memoryActiveId = (this._cache && this._cache.activeInterviewId)
        							? this._cache.activeInterviewId : null;
        						const recapViewId = this._recapViewId;
        						const empty = this.getEmptyData();
        						const offlineSnap = this.loadLocalSnapshot();
        						let deviceId = this.readDeviceIdFromLocal();
        						if (!deviceId && offlineSnap && offlineSnap.deviceId) {
        							deviceId = offlineSnap.deviceId;
        						}
        						if (!deviceId) {
        							try {
        								const localMeta = await this.fsGet(page, "_local/vu_device");
        								if (localMeta && localMeta.deviceId) { deviceId = localMeta.deviceId; }
        							} catch (e) { /* first run */ }
        						}
        						if (!deviceId) { deviceId = empty.deviceId; }
        						this.rememberDeviceId(deviceId);
        						let config: any = null;
        						try {
        							config = await this.fsGet(page, this.configDocId(deviceId));
        						} catch (e) { /* no config yet */ }
        						if (config && config.deviceId) {
        							this._cache = {
        								deviceId: config.deviceId,
        								eventId: config.eventId || empty.eventId,
        								investigatorName: config.investigatorName || empty.investigatorName,
        								speechLocale: config.speechLocale || empty.speechLocale,
        								questions: (config.questions || []).slice(),
        								interviews: [],
        								activeInterviewId: config.activeInterviewId || null
        							};
        						} else {
        							this._cache = empty;
        							this._cache.deviceId = deviceId;
        						}
        						try {
        							await this.fsPostSafe(page, { _id: "_local/vu_device", deviceId: deviceId, _use_policy: "override" });
        						} catch (e) { /* ignore */ }
        						this.rememberDeviceId(deviceId);
        						if (!config || !config.deviceId) {
        							try { await this.persistConfig(page); } catch (e) { /* ignore */ }
        						}
        						let interviews: any[] = [];
        						let loadedFromView = false;
        						try {
        							const viewRes = await this.fsView(page, "interviews_by_device", this._cache.deviceId);
        							const rows = (viewRes && viewRes.rows) ? viewRes.rows : [];
        							for (const row of rows) {
        								const id = (row.value && row.value.interviewId) ? row.value.interviewId : String(row.id || "").replace("interview:", "");
        								if (!id) { continue; }
        								try {
        									const doc = await this.fsGet(page, this.interviewDocId(id));
        									const iv = this.docToInterview(doc);
        									if (iv) {
        										interviews.push(iv);
        										this.rememberInterviewId(iv.interviewId);
        									}
        								} catch (e) { /* skip */ }
        							}
        							loadedFromView = true;
        						} catch (e) {
        							page.c8o.log.warn("[VoxUrssafV2] vue interviews_by_device indisponible — fallback localStorage", e);
        						}
        						const fallback = await this.loadInterviewsFallback(page, this._cache.deviceId);
        						for (const iv of fallback) {
        							if (!interviews.find((x: any) => x.interviewId === iv.interviewId)) {
        								interviews.push(iv);
        							}
        						}
        						if (offlineSnap && offlineSnap.interviews && offlineSnap.interviews.length) {
        							if (offlineSnap.deviceId && offlineSnap.deviceId !== this._cache.deviceId) {
        								this._cache.deviceId = offlineSnap.deviceId;
        								this.rememberDeviceId(offlineSnap.deviceId);
        							}
        							interviews = this.mergeInterviewsById(interviews, offlineSnap.interviews);
        						}
        						const merged = this.mergeInterviewsById(interviews, memoryInterviews);
        						merged.sort((a, b) => (b.updatedAt || "").localeCompare(a.updatedAt || ""));
        						this._cache.interviews = merged;
        						if (memoryActiveId) {
        							this._cache.activeInterviewId = memoryActiveId;
        						}
        						if (recapViewId) {
        							this._recapViewId = recapViewId;
        						}
        						if (offlineSnap && offlineSnap.investigatorName && !this._cache.investigatorName) {
        							this._cache.investigatorName = offlineSnap.investigatorName;
        						}
        						if (offlineSnap && offlineSnap.questions && (!this._cache.questions || !this._cache.questions.length)) {
        							this._cache.questions = (offlineSnap.questions || []).slice();
        						}
        						if (merged.length > 0) {
        							try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        						}
        					},
        	
        					async migrateLegacyIfNeeded(page: any): Promise<void> {
        						try {
        							const raw = localStorage.getItem(this.LEGACY_KEY);
        							if (!raw) { return; }
        							const legacy = JSON.parse(raw);
        							this._cache = legacy;
        							await this.persistConfig(page);
        							for (const iv of (legacy.interviews || [])) {
        								await this.persistInterview(page, iv);
        							}
        							try { await this.fsPush(page); } catch (e) { /* offline */ }
        							localStorage.removeItem(this.LEGACY_KEY);
        							page.c8o.log.info("[VoxUrssafV2] migration localStorage → FullSync terminée");
        						} catch (e) {
        							page.c8o.log.error("[VoxUrssafV2] migration localStorage", e);
        						}
        					},
        	
        					getInvestigatorName() { return this.load().investigatorName || "Enquêteur Terrain"; },
        					setInvestigatorName(name: string) {
        						const data = this.load();
        						data.investigatorName = name || "Enquêteur Terrain";
        						this.saveSync(this._page);
        					},
        					getSpeechLocale() { return this.load().speechLocale || "fr-FR"; },
        					getQuestions() { return (this.load().questions || []).slice(); },
        					setQuestions(list: string[]) {
        						const data = this.load();
        						data.questions = (list || []).slice();
        						this.saveSync(this._page);
        					},
        					listForHome() {
        						return (this.load().interviews || []).map((iv: any) => ({
        							id: iv.interviewId,
        							intervieweeName: iv.format === "salon"
        								? ((iv.firstName || iv.sheetCode || "Fiche salon").trim() || "Fiche salon")
        								: (iv.intervieweeName || "Anonyme"),
        							intervieweeRole: iv.intervieweeRole || "",
        							intervieweeCompany: iv.intervieweeCompany || "",
        							sheetCode: iv.sheetCode || "",
        							verbatimPreview: (iv.verbatimText || "").substring(0, 100),
        							globalSatisfaction: iv.globalSatisfaction || "",
        							isSalon: iv.format === "salon",
        							isDraft: iv.status === "draft",
        							wizardStep: iv.wizardStep || 1,
        							entryCount: iv.format === "salon"
        								? (iv.verbatimText ? 1 : 0) + (iv.photoDataUrl ? 1 : 0)
        								: ((iv.entries || []).length),
        							dateLabel: this.formatDate(iv.updatedAt || iv.createdAt),
        							status: iv.status || "saved"
        						}));
        					},
        					countTotalNotes() {
        						return (this.load().interviews || []).reduce((acc: number, iv: any) => {
        							if (iv.format === "salon") {
        								let n = 0;
        								if ((iv.verbatimText || "").trim()) { n++; }
        								if (iv.photoDataUrl) { n++; }
        								return acc + n;
        							}
        							return acc + ((iv.entries || []).length);
        						}, 0);
        					},
        					searchInterviews(query: string) {
        						const q = (query || "").toLowerCase().trim();
        						const list = this.listForHome();
        						if (!q) { return list; }
        						return list.filter((iv: any) => {
        							const n = (iv.intervieweeName || "").toLowerCase();
        							const c = (iv.intervieweeCompany || "").toLowerCase();
        							const s = (iv.sheetCode || "").toLowerCase();
        							const v = (iv.verbatimPreview || "").toLowerCase();
        							return n.indexOf(q) >= 0 || c.indexOf(q) >= 0 || s.indexOf(q) >= 0 || v.indexOf(q) >= 0;
        						});
        					},
        					getInterview(id: string) {
        						return (this.load().interviews || []).find((i: any) => i.interviewId === id) || null;
        					},
        					getActiveInterview() {
        						const data = this.load();
        						if (!data.activeInterviewId) { return null; }
        						return this.getInterview(data.activeInterviewId);
        					},
        					getRecapInterview() {
        						const data = this.load();
        						const id = this._recapViewId || data.activeInterviewId;
        						if (!id) { return null; }
        						return this.getInterview(id);
        					},
        					setRecapView(id: string) {
        						if (!id) { return null; }
        						this._recapViewId = id;
        						this.setActive(id);
        						return this.getInterview(id);
        					},
        					clearRecapView() {
        						this._recapViewId = null;
        					},
        					setActive(id: string) {
        						const data = this.load();
        						data.activeInterviewId = id;
        						this.saveSync(this._page);
        					},
        					clearActive() {
        						const data = this.load();
        						data.activeInterviewId = null;
        						this.persistConfigOnly(this._page);
        					},
        	
        					startNewSalon() {
        						const data = this.load();
        						const now = new Date().toISOString();
        						const iv = Object.assign({
        							interviewId: this.newId(),
        							status: "draft",
        							createdAt: now,
        							updatedAt: now,
        							intervieweeName: "",
        							intervieweeRole: "",
        							intervieweeCompany: "",
        							intervieweeEmail: "",
        							context: "",
        							entries: [] as any[]
        						}, this.emptySalonFields());
        						data.interviews.unshift(iv);
        						data.activeInterviewId = iv.interviewId;
        						try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        						const p = this._page;
        						if (p) {
        							this.enqueuePersist(p, async () => {
        								await this.persistConfig(p);
        								await this.persistInterview(p, iv);
        							});
        						}
        						return iv;
        					},
        					createInterview(name: string, role: string, company: string, context: string, email?: string) {
        						const data = this.load();
        						const now = new Date().toISOString();
        						const iv = {
        							interviewId: this.newId(),
        							status: "draft",
        							createdAt: now,
        							updatedAt: now,
        							intervieweeName: (name || "").trim() || "Anonyme",
        							intervieweeRole: role || "",
        							intervieweeCompany: company || "",
        							intervieweeEmail: email || "",
        							context: context || "",
        							entries: [] as any[]
        						};
        						data.interviews.unshift(iv);
        						data.activeInterviewId = iv.interviewId;
        						this.saveSync(this._page);
        						return iv;
        					},
        	
        					createSalonDraft() {
        						const data = this.load();
        						const now = new Date().toISOString();
        						const iv = Object.assign({
        							interviewId: this.newId(),
        							status: "draft",
        							createdAt: now,
        							updatedAt: now,
        							intervieweeName: "",
        							intervieweeRole: "",
        							intervieweeCompany: "",
        							intervieweeEmail: "",
        							context: "",
        							entries: [] as any[]
        						}, this.emptySalonFields());
        						data.interviews.unshift(iv);
        						data.activeInterviewId = iv.interviewId;
        						this.persistActiveOnly(this._page);
        						return iv;
        					},
        	
        					updateSalonDraft(partial: any) {
        						const iv = this.getActiveInterview();
        						if (!iv || iv.format !== "salon") { return null; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return null; }
        						Object.assign(data.interviews[idx], partial || {});
        						data.interviews[idx].updatedAt = new Date().toISOString();
        						data.interviews[idx].status = "draft";
        						try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        						this.persistActiveOnly(this._page);
        						return data.interviews[idx];
        					},
        	
        					getWizardRoute(step: number): string {
        						const routes: string[] = ["", "/interview-step-1", "/interview-step-2", "/interview-step-verbatim", "/interview-step-3", "/interview-step-4"];
        						const s = Math.max(1, Math.min(5, step || 1));
        						return routes[s] || "/interview-step-1";
        					},
        	
        					completeSalonInterview() {
        						const iv = this.getActiveInterview();
        						if (!iv || iv.format !== "salon") { return null; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return null; }
        						const row = data.interviews[idx];
        						row.intervieweeName = (row.firstName || row.sheetCode || "Fiche salon").trim();
        						row.intervieweeEmail = row.intervieweeEmail || "";
        						row.context = row.sheetCode || "";
        						row.wizardStep = 5;
        						row.status = "saved";
        						row.updatedAt = new Date().toISOString();
        						data.activeInterviewId = null;
        						this.rememberInterviewId(row.interviewId);
        						try { this.saveLocalSnapshot(); } catch (e) { /* ignore */ }
        						const p = this._page;
        						if (p) {
        							this.enqueuePersist(p, async () => {
        								await this.persistConfig(p);
        								await this.persistAllInterviews(p);
        							});
        						}
        						return row;
        					},
        					updateActiveMeta(name: string, role: string, company: string, context: string, email?: string) {
        						const iv = this.getActiveInterview();
        						if (!iv) { return; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return; }
        						data.interviews[idx].intervieweeName = (name || "").trim() || "Anonyme";
        						data.interviews[idx].intervieweeRole = role || "";
        						data.interviews[idx].intervieweeCompany = company || "";
        						data.interviews[idx].intervieweeEmail = email || "";
        						data.interviews[idx].context = context || "";
        						data.interviews[idx].updatedAt = new Date().toISOString();
        						this.saveSync(this._page);
        					},
        					setActiveEntries(entries: any[]) {
        						const iv = this.getActiveInterview();
        						if (!iv) { return; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return; }
        						data.interviews[idx].entries = (entries || []).slice();
        						data.interviews[idx].updatedAt = new Date().toISOString();
        						this.saveSync(this._page);
        					},
        					appendEntryToActive(entry: any) {
        						const iv = this.getActiveInterview();
        						if (!iv) { return; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return; }
        						if (!data.interviews[idx].entries) { data.interviews[idx].entries = []; }
        						data.interviews[idx].entries.push(entry);
        						data.interviews[idx].updatedAt = new Date().toISOString();
        						data.interviews[idx].status = "draft";
        						this.saveSync(this._page);
        					},
        					saveActiveInterview() {
        						const iv = this.getActiveInterview();
        						if (!iv) { return null; }
        						const data = this.load();
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === iv.interviewId);
        						if (idx < 0) { return null; }
        						data.interviews[idx].status = "saved";
        						data.interviews[idx].updatedAt = new Date().toISOString();
        						data.activeInterviewId = null;
        						this.saveSync(this._page);
        						return data.interviews[idx];
        					},
        					resumeInterview(homeItem: any) {
        						if (!homeItem || !homeItem.id) { return null; }
        						const iv = this.getInterview(homeItem.id);
        						if (!iv) { return null; }
        						this.setRecapView(homeItem.id);
        						if (iv.format === "salon" && iv.status === "draft") {
        							return { iv: iv, route: this.getWizardRoute(iv.wizardStep || 1) };
        						}
        						return { iv: iv, route: "/interview-recap" };
        					},
        					buildSalonSyncPayload(iv: any) {
        						const photos: any[] = [];
        						if (iv.photoDataUrl) {
        							photos.push({ photoId: "salon-photo-1", order: 0, dataUrl: iv.photoDataUrl });
        						}
        						return {
        							payload: {
        								format: "salon",
        								sheetCode: iv.sheetCode,
        								journeySteps: iv.journeySteps || [],
        								globalSatisfaction: iv.globalSatisfaction,
        								verbatimText: iv.verbatimText,
        								sector: iv.sector,
        								age: iv.age,
        								urssafSince: iv.urssafSince,
        								multiProfile: iv.multiProfile,
        								profileCount: iv.profileCount,
        								contactMode: iv.contactMode,
        								consentAccepted: iv.consentAccepted,
        								recontactOk: iv.recontactOk,
        								firstName: iv.firstName,
        								intervieweeEmail: iv.intervieweeEmail,
        								intervieweeName: iv.intervieweeName,
        								context: iv.context
        							},
        							photos: photos
        						};
        					},
        					buildSyncPayload(iv: any) {
        						if (iv.format === "salon") {
        							return this.buildSalonSyncPayload(iv);
        						}
        						const photos = (iv.entries || []).filter((e: any) => e.type === "photo");
        						return {
        							payload: {
        								intervieweeName: iv.intervieweeName,
        								intervieweeRole: iv.intervieweeRole,
        								intervieweeCompany: iv.intervieweeCompany,
        								intervieweeEmail: iv.intervieweeEmail,
        								context: iv.context,
        								entries: iv.entries || []
        							},
        							photos: photos.map((p: any, i: number) => ({
        								photoId: p.id || ("p-" + i),
        								order: i,
        								dataUrl: p.extra || ""
        							}))
        						};
        					},
        					async syncInterview(page: any, interviewId: string): Promise<boolean> {
        						const iv = this.getInterview(interviewId);
        						if (!iv) { return false; }
        						const data = this.load();
        						const sync = this.buildSyncPayload(iv);
        						try { await this.persistInterview(page, iv); } catch (e) {
        							try { page.c8o.log.warn("[VoxUrssafV2] persist avant export SQL", e); } catch (e2) { /* ignore */ }
        						}
        						iv.status = "syncing";
        						const idx = data.interviews.findIndex((i: any) => i.interviewId === interviewId);
        						if (idx >= 0) { data.interviews[idx] = iv; await this.persistInterview(page, iv); }
        						const sqlParams: any = {
        							interview_id: iv.interviewId,
        							event_id: data.eventId,
        							status: "synced",
        							created_at: this.formatSqlTimestamp(iv.createdAt),
        							device_id: data.deviceId,
        							participant_label: iv.format === "salon"
        								? (iv.firstName || iv.sheetCode || iv.intervieweeName || "")
        								: (iv.intervieweeName || ""),
        							zone: iv.format === "salon" ? (iv.sheetCode || "") : (iv.context || ""),
        							answers_json: JSON.stringify(sync.payload),
