icon: mic
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public currentQuestion: string = "Général / Contexte";
        	public activeTab: string = "text";
        	public textInput: string = "";
        	public showSaveModal: boolean = false;
        	public isRecording: boolean = false;
        	public reviewingAudio: boolean = false;
        	public audioTranscript: string = "";
        	public showMicError: boolean = false;
        	public micErrorMessage: string = "";
        	public editingEntryId: string = "";
        	public editEntryValue: string = "";
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public getStore(): any {
        		return this.global.interviewStore;
        	}
        	public defaultQuestions(): string[] {
        		return [
        			"Général / Contexte",
        			"Quels sont vos principaux défis actuels ?",
        			"Comment utilisez-vous notre produit/service ?",
        			"Qu'est-ce qui vous manque le plus aujourd'hui ?",
        			"Quel est votre retour sur l'événement ?"
        		];
        	}
        	public async loadActive(): Promise<void> {
        		if (!this.local.questions || !this.local.questions.length) {
        			this.local.questions = this.defaultQuestions();
        		}
        		if (!this.currentQuestion) {
        			this.currentQuestion = "Général / Contexte";
        		}
        		const store = this.getStore();
        		if (!store) { return; }
        		if (store.whenReady) { await store.whenReady(); }
        		let iv = store.getActiveInterview();
        		if (!iv) {
        			iv = store.createInterview("", "", "", "", "");
        		}
        		const qs = store.getQuestions();
        		this.local.questions = (qs && qs.length) ? qs.slice() : this.defaultQuestions();
        		this.local.entries = (iv.entries || []).slice();
        		if (!this.currentQuestion || this.local.questions.indexOf(this.currentQuestion) < 0) {
        			this.currentQuestion = this.local.questions[0] || "Général / Contexte";
        		}
        		const name = iv.intervieweeName || "";
        		this.local.displayName = (name && name !== "Anonyme") ? name : "Intervenant Anonyme";
        		this.local.displayRole = iv.intervieweeRole || "";
        		this.local.displayCompany = iv.intervieweeCompany || "";
        		this.local.displayContext = iv.context || "";
        		const d = new Date();
        		this.local.timeLabel = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        	}
        	public setTab(tab: string): void {
        		if (this.activeTab === "audio" && tab !== "audio" && this.isRecording) {
        			this.global.stopSpeechListening(this);
        			this.isRecording = false;
        		}
        		this.activeTab = tab;
        	}
        	public applySpeechReceived(data: any): void {
        		if (!this.isRecording || this.reviewingAudio) { return; }
        		if (data != null && typeof data === "object" && !Array.isArray(data)) {
        			if (data.mode === "snapshot") {
        				const committed = (data.final || "").trim();
        				const interim = (data.interim || "").trim();
        				let display = committed;
        				if (interim) {
        					display = (display ? display + " " : "") + interim + " (en cours...)";
        				}
        				this.audioTranscript = display.trim();
        				return;
        			}
        			if ("final" in data || "interim" in data) {
        				const committed = (data.final || "").trim();
        				const interim = (data.interim || "").trim();
        				let display = committed;
        				if (interim) {
        					display = (display ? display + " " : "") + interim + " (en cours...)";
        				}
        				this.audioTranscript = display.trim();
        				return;
        			}
        		}
        		const chunk = Array.isArray(data) ? data.join(" ") : String(data != null ? data : "");
        		if (!chunk.trim()) { return; }
        		this.audioTranscript = chunk.trim();
        	}
        	public async toggleRecording(): Promise<void> {
        		if (this.isRecording) {
        			this.global.stopSpeechListening(this);
        			this.isRecording = false;
        			this.audioTranscript = (this.audioTranscript || "").replace(/\s*\(en cours...\)$/i, "").trim();
        			this.reviewingAudio = true;
        			return;
        		}
        		this.audioTranscript = "";
        		this.reviewingAudio = false;
        		this.showMicError = false;
        		this.micErrorMessage = "";
        		try {
        			await this.global.startSpeechListening(this);
        			this.isRecording = true;
        		} catch (e) {
        			const msg = (typeof e === "string")
        				? e
        				: ((e && (e.message || e.error)) ? (e.message || e.error) : String(e));
        			// Message plus précis : "not-allowed" => permission, sinon erreur technique WebSpeech/Cordova.
        			if (msg && (msg.indexOf("not-allowed") >= 0 || msg.indexOf("service-not-allowed") >= 0 || msg.indexOf("NotAllowed") >= 0)) {
        				this.micErrorMessage = "Accès micro refusé. Autorisez le microphone pour ce site.";
        			} else if (msg && msg.indexOf("no-speech") >= 0) {
        				this.micErrorMessage = "Aucun son détecté. Parlez après avoir démarré la dictée.";
        			} else if (msg && msg.indexOf("audio-capture") >= 0) {
        				this.micErrorMessage = "Micro indisponible (aucune entrée audio).";
        			} else if (msg && msg.indexOf("network") >= 0) {
        				this.micErrorMessage = "Erreur réseau de la dictée (Web Speech).";
        			} else {
        				this.micErrorMessage = "Erreur dictée : " + (msg || "inconnue");
        			}
        			this.showMicError = true;
        			this.isRecording = false;
        			setTimeout(() => { this.showMicError = false; this.ref.markForCheck(); }, 3000);
        		}
        	}
        	public saveAudioDraft(): void {
        		const t = (this.audioTranscript || "").trim();
        		if (t) {
        			this.addEntry("audio", t, "Audio attaché");
        		} else {
        			this.addEntry("audio", "Enregistrement audio (sans texte)", "Audio attaché");
        		}
        		this.audioTranscript = "";
        		this.reviewingAudio = false;
        	}
        	public cancelAudioDraft(): void {
        		this.audioTranscript = "";
        		this.reviewingAudio = false;
        	}
        	public resolveCurrentQuestion(): string {
        		const cur = (this.currentQuestion || "").trim();
        		if (cur) { return cur; }
        		const qs = (this.local && this.local.questions && this.local.questions.length)
        			? this.local.questions
        			: this.defaultQuestions();
        		return String(qs[0] || "Général / Contexte").trim();
        	}
        	public entryQuestionLabel(entry: any): string {
        		const q = (entry && entry.question) ? String(entry.question).trim() : "";
        		if (q) { return q; }
        		return this.resolveCurrentQuestion();
        	}
        	public addEntry(type: string, content: string, extra?: string): void {
        		const d = new Date();
        		const entry = {
        			id: Date.now().toString(),
        			type,
        			content,
        			extra: extra || null,
        			question: this.resolveCurrentQuestion(),
        			timeLabel: d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        		};
        		if (!this.local.entries) { this.local.entries = []; }
        		this.local.entries = [...this.local.entries, entry];
        		const store = this.getStore();
        		if (store) { store.appendEntryToActive(entry); }
        	}
        	public startEditEntry(entry: any): void {
        		if (!entry) { return; }
        		this.editingEntryId = String(entry.id || "");
        		this.editEntryValue = String(entry.content || "");
        	}
        	public cancelEditEntry(): void {
        		this.editingEntryId = "";
        	}
        	public saveEditEntry(): void {
        		const id = String(this.editingEntryId || "");
        		if (!id) { return; }
        		const entry = (this.local?.entries || []).find((e: any) => String(e?.id || "") === id);
        		if (!entry) { return; }
        		const t = (this.editEntryValue || "").trim();
        		entry.content = t;
        		this.editingEntryId = "";
        		const store = this.getStore();
        		if (store) { store.setActiveEntries(this.local.entries || []); }
        	}
        	public deleteEntry(entry: any): void {
        		if (!entry) { return; }
        		const id = String(entry.id || "");
        		if (!id) { return; }
        		this.local.entries = (this.local.entries || []).filter((e: any) => String(e?.id || "") !== id);
        		if (this.editingEntryId === id) {
        			this.editingEntryId = "";
        			this.editEntryValue = "";
        		}
        		const store = this.getStore();
        		if (store) { store.setActiveEntries(this.local.entries || []); }
        	}
        	public recordingButtonLabel(): string {
        		return this.isRecording ? "Stopper & Vérifier" : "Démarrer la dictée";
        	}
        	public recordingButtonColor(): string {
        		return this.isRecording ? "danger" : "primary";
        	}
        	public recordingIconName(): string {
        		return this.isRecording ? "stop-circle" : "mic";
        	}
        	public showToast(msg: string, color: string = "medium"): void {
        		const toastCtrl = this.getInstance(ToastController);
        		toastCtrl.create({ message: msg, duration: 2500, position: "bottom", color: color }).then(t => t.present());
        	}
        	public async confirmEndSession(): Promise<void> {
        		const ctrl = this.getInstance(AlertController);
        		const alert = await ctrl.create({
        			header: "Terminer la session ?",
        			message: "L''interview sera enregistrée sur cet appareil. Vous pourrez la rouvrir depuis l''accueil.",
        			buttons: [
        				{ text: "Annuler", role: "cancel" },
        				{ text: "Confirmer", role: "confirm" }
        			]
        		});
        		await alert.present();
        		const res = await alert.onDidDismiss();
        		if (res && res.role === "confirm") {
        			const store = this.getStore();
        			if (store) {
        				store.setActiveEntries(this.local.entries || []);
        				store.saveActiveInterview();
        			}
        			this.angularRouter.navigate(["/"]);
        		}
        	}
        	public submitText(): void {
        		const t = (this.textInput || "").trim();
        		if (!t) { return; }
        		this.addEntry("text", t);
        		this.textInput = "";
        	}
        	public showRoleLine(): boolean {
        		return !!(this.local?.displayRole || this.local?.displayCompany);
        	}
        	public isTextOrAudioEntry(entry: any): boolean {
        		return entry && (entry.type === "text" || entry.type === "audio");
        	}
        	public isPhotoEntry(entry: any): boolean {
        		return entry && entry.type === "photo";
        	}
        	public handlePhotoCapture(out: any): void {
        		let raw = "";
        		if (out != null && out !== undefined) {
        			if (typeof out === "string") {
        				raw = out;
        			} else if (typeof URL !== "undefined" && out instanceof URL) {
        				raw = out.href;
        			} else if (typeof out === "object") {
        				raw = out.dataURI || out.dataUrl || out.href || out.path || "";
        			}
        		}
        		raw = (raw || "").trim();
        		if (!raw) {
        			this.showToast("Aucune photo capturée");
        			return;
        		}
        		const imageUrl = raw.indexOf("data:") === 0 ? raw : "data:image/jpeg;base64," + raw;
        		const name = "photo-" + Date.now() + ".jpg";
        		this.addEntry("photo", "Photo capturée: " + name, imageUrl);
        	}
        	/*End_c8o_PageFunction*/'
