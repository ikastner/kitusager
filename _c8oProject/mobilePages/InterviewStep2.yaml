icon: chatbubbles
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public journeySteps: string[] = [];
        	public globalSatisfaction: string = "";
        	public verbatimDraft: string = "";
        	public verbatimAudioDataUrl: string = "";
        	public isRecording: boolean = false;
        	public speechAudioMode: boolean = false;
        	public speechModeHint: string = "";
        	public showMicError: boolean = false;
        	public micErrorMessage: string = "";
        	public wizardCanProceed: boolean = false;
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.ensureInterviewStore) { return app.ensureInterviewStore(this); }
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return app && app.getInterviewStore ? app.getInterviewStore() : null;
        	}
        	public async loadStep(): Promise<void> {
        		const store = await this.ensureStore();
        		if (!store) { return; }
        		const iv = store.getActiveInterview();
        		if (!iv || iv.format !== "salon") { return; }
        		this.journeySteps = (iv.journeySteps || []).slice();
        		this.globalSatisfaction = iv.globalSatisfaction || "";
        		this.verbatimDraft = iv.verbatimText || "";
        		this.verbatimAudioDataUrl = iv.verbatimAudioDataUrl || "";
        	}
        	public isJourneyOn(id: string): boolean {
        		return (this.journeySteps || []).indexOf(id) >= 0;
        	}
        	public toggleJourney(id: string): void {
        		const steps = (this.journeySteps || []).slice();
        		const idx = steps.indexOf(id);
        		if (idx >= 0) { steps.splice(idx, 1); } else { steps.push(id); }
        		this.journeySteps = steps;
        	}
        	public setSatisfaction(id: string): void {
        		this.globalSatisfaction = id;
        	}
        	public applySpeechReceived(data: any): void {
        		if (!this.isRecording) { return; }
        		if (data != null && typeof data === "object" && !Array.isArray(data)) {
        			if (data.mode === "snapshot" || "final" in data || "interim" in data) {
        				const committed = (data.final || "").trim();
        				const interim = (data.interim || "").trim();
        				const base = (this.verbatimDraft || "").replace(/\s*\(en cours...\)$/i, "").trim();
        				let display = committed;
        				if (interim) {
        					display = (display ? display + " " : "") + interim + " (en cours...)";
        				} else if (!display && base) {
        					display = base;
        				}
        				this.verbatimDraft = display.trim();
        				this.ref.markForCheck();
        				return;
        			}
        		}
        		const chunk = Array.isArray(data) ? data.join(" ") : String(data != null ? data : "");
        		if (!chunk.trim()) { return; }
        		const base = (this.verbatimDraft || "").replace(/\s*\(en cours...\)$/i, "").trim();
        		const next = chunk.trim();
        		this.verbatimDraft = base ? (base + " " + next) : next;
        		this.ref.markForCheck();
        	}
        	public applyAudioRecorded(dataUrl: string): void {
        		this.verbatimAudioDataUrl = dataUrl || "";
        		this.speechAudioMode = false;
        		this.speechModeHint = "";
        		if (!(this.verbatimDraft || "").trim()) {
        			this.verbatimDraft = "[Enregistrement audio — saisir ou corriger le verbatim ci-dessus]";
        		}
        		this.ref.markForCheck();
        	}
        	public onAudioRecordingEmpty(): void {
        		this.speechAudioMode = false;
        		this.speechModeHint = "";
        		this.showMicError = true;
        		this.micErrorMessage = "Aucun son enregistré. Rapprochez-vous du micro et réessayez.";
        		setTimeout(() => { this.showMicError = false; this.ref.markForCheck(); }, 4000);
        		this.ref.markForCheck();
        	}
        	public applySpeechModeChanged(data: any): void {
        		if (!data || data.mode !== "audio") { return; }
        		this.speechAudioMode = true;
        		this.speechModeHint = data.message || "Enregistrement audio actif.";
        		this.ref.markForCheck();
        	}
        	public recordingBadgeLabel(): string {
        		if (this.speechAudioMode) {
        			return "Enregistrement audio — parlez puis retouchez le micro";
        		}
        		return "Dictée en cours…";
        	}
        	public async toggleRecording(): Promise<void> {
        		if (this.isRecording) {
        			this.global.stopSpeechListening(this);
        			this.isRecording = false;
        			this.speechAudioMode = false;
        			this.speechModeHint = "";
        			this.verbatimDraft = (this.verbatimDraft || "").replace(/\s*\(en cours...\)$/i, "").trim();
        			if (this.verbatimDraft === "[Enregistrement audio — saisir ou corriger le verbatim ci-dessus]" && this.verbatimAudioDataUrl) {
        				/* garder le placeholder tant qu''aucun texte saisi */
        			}
        			this.ref.markForCheck();
        			return;
        		}
        		this.showMicError = false;
        		this.micErrorMessage = "";
        		this.isRecording = true;
        		this.ref.markForCheck();
        		try {
        			await this.global.startSpeechListening(this);
        		} catch (e) {
        			this.isRecording = false;
        			const msg = (typeof e === "string") ? e : ((e && (e.message || e.error)) ? (e.message || e.error) : String(e));
        			if (msg && (msg.indexOf("not-allowed") >= 0 || msg.indexOf("NotAllowed") >= 0)) {
        				this.micErrorMessage = "Accès micro refusé. Autorisez le microphone dans les paramètres Android.";
        			} else if (msg && msg.indexOf("permission") >= 0) {
        				this.micErrorMessage = "Permission micro requise. Acceptez l''accès au microphone.";
        			} else if (msg && msg.indexOf("speech_recognition_unavailable") >= 0) {
        				this.micErrorMessage = "Dictée auto indisponible sur cet appareil (GrapheneOS / sans Google). Installez l''app Google depuis le Play Store, ou utilisez l''enregistrement audio + saisie manuelle.";
        			} else if (msg && msg.indexOf("Plugin dictée") >= 0) {
        				this.micErrorMessage = "Dictée indisponible : reconstruisez l''APK depuis Convertigo Studio.";
        			} else if (msg && msg.indexOf("no-speech") >= 0) {
        				this.micErrorMessage = "Aucun son détecté. Parlez après avoir démarré la dictée.";
        			} else {
        				this.micErrorMessage = "Erreur dictée : " + (msg || "inconnue");
        			}
        			this.showMicError = true;
        			this.isRecording = false;
        			setTimeout(() => { this.showMicError = false; this.ref.markForCheck(); }, 3000);
        		}
        	}
        	public getStoreSync(): any {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        	}
        	public commitStep3(): void {
        		this.wizardCanProceed = false;
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			journeySteps: (this.journeySteps || []).slice(),
        			globalSatisfaction: this.globalSatisfaction || "",
        			verbatimText: (this.verbatimDraft || "").trim(),
        			verbatimAudioDataUrl: this.verbatimAudioDataUrl || "",
        			wizardStep: 3
        		});
        		this.wizardCanProceed = true;
        	}
        	public commitBack(): void {
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			journeySteps: (this.journeySteps || []).slice(),
        			globalSatisfaction: this.globalSatisfaction || "",
        			verbatimText: (this.verbatimDraft || "").trim(),
        			verbatimAudioDataUrl: this.verbatimAudioDataUrl || "",
        			wizardStep: 1
        		});
        	}
        	public chipClass(id: string): string {
        		return "vu-toggle-chip" + (this.isJourneyOn(id) ? " vu-toggle-chip--on" : "");
        	}
        	public satClass(id: string): string {
        		return "vu-satisfaction-option" + (this.globalSatisfaction === id ? " vu-satisfaction-option--on" : "");
        	}
        	/*End_c8o_PageFunction*/'
