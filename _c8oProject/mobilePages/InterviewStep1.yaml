comment: Wizard salon — étape 1/4 code fiche
icon: document-text
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public sheetCode: string = "";
        	public salonName: string = "";
        	public fieldError: string = "";
        	public wizardCanProceed: boolean = false;
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.ensureInterviewStore) {
        			return app.ensureInterviewStore(this);
        		}
        		if (app && app.initVuApp) { app.initVuApp(); }
        		const store = (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        		if (store && store.whenReady) { await store.whenReady(); }
        		return store;
        	}
        	public async showToast(msg: string): Promise<void> {
        		const toastCtrl = this.getInstance(ToastController);
        		const toast = await toastCtrl.create({ message: msg, duration: 2500, position: "bottom", color: "warning" });
        		await toast.present();
        	}
        	public async loadStep(): Promise<void> {
        		const store = await this.ensureStore();
        		if (!store) { return; }
        		let iv = store.getActiveInterview();
        		if (!iv || iv.format !== "salon") {
        			iv = store.createSalonDraft();
        		}
        		this.sheetCode = iv.sheetCode || "";
        		if (this.sheetCode.startsWith("F-") && this.sheetCode.includes(" - ")) {
        			this.salonName = this.sheetCode.substring(this.sheetCode.indexOf(" - ") + 3);
        		} else {
        			this.salonName = this.sheetCode.replace(/^F-?/i, "");
        		}
        	}
        	public getFicheLabel(): string {
        		const store = this.getStoreSync();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || !iv.sheetCode || iv.sheetCode === "F-") { return ""; }
        		return iv.sheetCode;
        	}
        	public getStoreSync(): any {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        	}
        	/** Synchrone — requis pour que IfAction / PushPage (enfants) voient wizardCanProceed avant resolve(). */
        	public commitStep1(): void {
        		this.wizardCanProceed = false;
        		this.fieldError = "";
        		const store = this.getStoreSync();
        		if (!store) {
        			this.fieldError = "Store non disponible";
        			return;
        		}
        		if (store._page !== this) { store._page = this; }
        		let iv = store.getActiveInterview();
        		if (!iv || iv.format !== "salon") {
        			iv = store.createSalonDraft();
        		}
        		const sName = (this.salonName || "").trim();
        		if (!sName) {
        			this.fieldError = "Indiquez le nom du salon";
        			return;
        		}
        		const d = new Date(iv.createdAt || new Date());
        		const pad = (n: number) => n < 10 ? ''0'' + n : n;
        		const dateStr = pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + "/" + d.getFullYear() + " " + pad(d.getHours()) + ":" + pad(d.getMinutes());
        		const computedCode = "F-" + dateStr + " - " + sName;
        		this.sheetCode = computedCode;
        		store.updateSalonDraft({ sheetCode: computedCode, wizardStep: 2 });
        		this.wizardCanProceed = true;
        	}
        	/*End_c8o_PageFunction*/'
