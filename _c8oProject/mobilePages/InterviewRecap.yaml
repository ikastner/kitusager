    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public sheetCode: string = "";
        	public firstName: string = "";
        	public intervieweeEmail: string = "";
        	public status: string = "";
        	public dateLabel: string = "";
        	public journeyText: string = "";
        	public globalSatisfaction: string = "";
        	public verbatimText: string = "";
        	public sector: string = "";
        	public age: string = "";
        	public urssafSince: string = "";
        	public multiProfileText: string = "";
        	public contactMode: string = "";
        	public consentText: string = "";
        	public recontactText: string = "";
        	public photoDataUrl: string = "";
        	public photoDataUrls: string[] = [];
        	public syncError: string = "";
        	public isDraft: boolean = false;
        	public isSalon: boolean = true;
        	public notFound: boolean = false;
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		console.log("[VoxUrssafV2][Recap] ensureStore — début", {
        			globalStore: !!(this.global && this.global.interviewStore),
        			navParamsData: this.navParams ? this.navParams.data : null,
        			url: this.angularRouter ? this.angularRouter.url : ""
        		});
        		// Même accès synchrone que Page.getStore / InterviewAll — évite le blocage whenReady()
        		const store = (this.global && this.global.interviewStore) || null;
        		const count = (store && store.load) ? (store.load().interviews || []).length : -1;
        		console.log("[VoxUrssafV2][Recap] ensureStore — fin", { storeOk: !!store, interviewsCache: count });
        		return store;
        	}
        	public getRecapNavInterviewId(): string {
        		let id = "";
        		if (this.navParams && this.navParams.get) {
        			id = this.navParams.get("interviewId") || "";
        		}
        		if (!id && this.navParams && this.navParams.data) {
        			id = this.navParams.data.interviewId || "";
        		}
        		if (!id && this.angularRouter) {
        			try {
        				const tree = this.angularRouter.parseUrl(this.angularRouter.url || "");
        				id = (tree.queryParams && tree.queryParams.interviewId) ? String(tree.queryParams.interviewId) : "";
        			} catch (e) {
        				console.warn("[VoxUrssafV2][Recap] parseUrl interviewId", e);
        			}
        		}
        		return id || "";
        	}
        	public displayOrDash(v: string): string {
        		const s = (v || "").trim();
        		return s || "—";
        	}
        	public labelJourney(id: string): string {
        		const m: any = {
        			creation: "Création activité",
        			vie_courante: "Vie courante",
        			imprevus: "Imprévus",
        			fin: "Fin de parcours"
        		};
        		return m[id] || id;
        	}
        	public labelSatisfaction(id: string): string {
        		const m: any = {
        			tres_insatisfait: "Très insatisfait",
        			moyen: "Moyen",
        			satisfait: "Satisfait",
        			tres_satisfait: "Très satisfait"
        		};
        		return m[id] || id;
        	}
        	public labelContact(mode: string): string {
        		if (mode === "direct") { return "Contact direct Urssaf"; }
        		if (mode === "intermediaire") { return "Via intermédiaire"; }
        		return mode || "";
        	}
        	public statusLabel(st: string): string {
        		const m: any = {
        			draft: "Brouillon",
        			saved: "Validée",
        			synced: "Synchronisée",
        			syncing: "Synchronisation…",
        			error: "Erreur sync",
        			ready: "Prête"
        		};
        		return m[st] || st || "—";
        	}
        	public statusClass(st: string): string {
        		const s = st || "";
        		if (s === "synced") { return "vu-badge-pill vu-status-synced"; }
        		if (s === "saved") { return "vu-badge-pill vu-status-saved"; }
        		if (s === "draft") { return "vu-badge-pill vu-status-draft"; }
        		if (s === "error") { return "vu-badge-pill vu-status-error"; }
        		return "vu-badge-pill";
        	}
        	public async loadRecap(): Promise<void> {
        		console.log("[VoxUrssafV2][Recap] loadRecap — début");
        		try {
        			const store = await this.ensureStore();
        			if (!store) {
        				console.error("[VoxUrssafV2][Recap] store introuvable");
        				this.notFound = true;
        				return;
        			}
        			if (store._page !== this) { store._page = this; }
        			if (store.shouldHydrateFromSnapshot && store.shouldHydrateFromSnapshot()) {
        				const hydrated = store.hydrateFromLocalSnapshot();
        				console.log("[VoxUrssafV2][Recap] hydrateFromLocalSnapshot", hydrated);
        			}
        			const navInterviewId = this.getRecapNavInterviewId();
        			console.log("[VoxUrssafV2][Recap] navInterviewId", navInterviewId, {
        				recapViewId: store._recapViewId,
        				activeInterviewId: store.load().activeInterviewId,
        				cacheIds: (store.load().interviews || []).map((i: any) => i.interviewId)
        			});
        			let iv: any = null;
        			let source = "";
        			if (navInterviewId) {
        				iv = store.getInterview(navInterviewId);
        				if (store.enrichInterviewFromSnapshot) {
        					iv = store.enrichInterviewFromSnapshot(iv, navInterviewId);
        				}
        				source = "cache+snapshot";
        				const sparse = iv && store.isInterviewSparse ? store.isInterviewSparse(iv) : !iv;
        				if (sparse && store.getInterviewForRecap) {
        					console.log("[VoxUrssafV2][Recap] cache vide/sparse — fsGet", navInterviewId);
        					iv = await store.getInterviewForRecap(this, navInterviewId);
        					source = "getInterviewForRecap";
        				}
        			}
        			if (!iv) {
        				iv = store.getRecapInterview();
        				source = source || "getRecapInterview";
        				if (iv && store.enrichInterviewFromSnapshot) {
        					iv = store.enrichInterviewFromSnapshot(iv, iv.interviewId);
        				}
        			}
        			console.log("[VoxUrssafV2][Recap] interview chargée", {
        				source: source,
        				found: !!iv,
        				interviewId: iv ? iv.interviewId : null,
        				sheetCode: iv ? iv.sheetCode : null,
        				firstName: iv ? iv.firstName : null,
        				verbatimLen: iv && iv.verbatimText ? iv.verbatimText.length : 0,
        				format: iv ? iv.format : null,
        				status: iv ? iv.status : null,
        				sparse: iv && store.isInterviewSparse ? store.isInterviewSparse(iv) : null
        			});
        			if (!iv) {
        				this.notFound = true;
        				console.warn("[VoxUrssafV2][Recap] fiche introuvable pour id", navInterviewId);
        				return;
        			}
        			if (store.setRecapView) { store.setRecapView(iv.interviewId); }
        			this.notFound = false;
        			this.isSalon = iv.format === "salon";
        			this.isDraft = iv.status === "draft";
        			this.status = iv.status || "";
        			this.sheetCode = iv.sheetCode || iv.context || "";
        			this.firstName = iv.firstName || iv.intervieweeName || "";
        			this.intervieweeEmail = iv.intervieweeEmail || "";
        			this.dateLabel = store.formatDate(iv.updatedAt || iv.createdAt);
        			const steps = (iv.journeySteps || []).map((id: string) => this.labelJourney(id));
        			this.journeyText = steps.length ? steps.join(", ") : "";
        			this.globalSatisfaction = this.labelSatisfaction(iv.globalSatisfaction || "");
        			this.verbatimText = iv.verbatimText || "";
        			this.sector = iv.sector || "";
        			this.age = iv.age || "";
        			this.urssafSince = iv.urssafSince || "";
        			if (iv.multiProfile === true) {
        				this.multiProfileText = "Oui" + ((iv.profileCount || "").trim() ? " (" + iv.profileCount + ")" : "");
        			} else if (iv.multiProfile === false) {
        				this.multiProfileText = "Non";
        			} else {
        				this.multiProfileText = "";
        			}
        			this.contactMode = this.labelContact(iv.contactMode || "");
        			this.consentText = iv.consentAccepted ? "Accepté" : "Non accepté";
        			this.recontactText = iv.recontactOk ? "Oui" : "Non";
        			this.photoDataUrls = (iv.photoDataUrls && iv.photoDataUrls.length)
        				? iv.photoDataUrls.slice()
        				: (iv.photoDataUrl ? [iv.photoDataUrl] : []);
        			this.photoDataUrl = this.photoDataUrls[0] || "";
        			this.syncError = iv.syncError || "";
        			console.log("[VoxUrssafV2][Recap] champs bindés", {
        				sheetCode: this.sheetCode,
        				firstName: this.firstName,
        				journeyText: this.journeyText,
        				verbatimText: (this.verbatimText || "").substring(0, 80),
        				notFound: this.notFound
        			});
        		} catch (e) {
        			console.error("[VoxUrssafV2][Recap] loadRecap erreur", e);
        			this.notFound = true;
        		}
        	}
        	public async continueEdit(): Promise<void> {
        		const store = await this.ensureStore();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || !store) { return; }
        		const route = store.getWizardRoute(iv.wizardStep || 1);
        		this.angularRouter.navigate([route]);
        	}
        	public hasPhoto(): boolean {
        		return (this.photoDataUrls && this.photoDataUrls.length > 0) || !!(this.photoDataUrl || "").trim();
        	}
        	public hasVerbatim(): boolean {
        		return !!(this.verbatimText || "").trim();
        	}
        	/*End_c8o_PageFunction*/'
