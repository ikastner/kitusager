scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public investigatorName: string = "";
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async loadProfile(): Promise<void> {
        		const store = this.global.interviewStore;
        		if (store && store.whenReady) { await store.whenReady(); }
        		this.investigatorName = store ? store.getInvestigatorName() : (this.global.investigatorName || "Enquêteur Terrain");
        	}
        	public async saveProfile(): Promise<void> {
        		const store = this.global.interviewStore;
        		const name = this.investigatorName || "Enquêteur Terrain";
        		if (store) { store.setInvestigatorName(name); }
        		this.global.investigatorName = name;
        		const toastCtrl = this.getInstance(ToastController);
        		const toast = await toastCtrl.create({ message: "Profil enregistré", duration: 2000, position: "bottom", color: "success" });
        		await toast.present();
        		this.angularRouter.navigate(["/"]);
        	}
        	/*End_c8o_PageFunction*/'
