comment: Nouvelle fiche intervenant — voxUrssafReact setup
icon: person-add
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public intervieweeName: string = "";
        	public intervieweeRole: string = "";
        	public intervieweeCompany: string = "";
        	public context: string = "";
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public resetForm(): void {
        		this.intervieweeName = "";
        		this.intervieweeRole = "";
        		this.intervieweeCompany = "";
        		this.context = "";
        		const store = this.global.interviewStore;
        		if (store) { store.clearActive(); }
        	}
        	public startInterview(): void {
        		const store = this.global.interviewStore;
        		if (!store) { return; }
        		store.createInterview(this.intervieweeName, this.intervieweeRole, this.intervieweeCompany, this.context, "");
        	}
        	/*End_c8o_PageFunction*/'
