comment: Wizard salon — étape 4/4 consentement, photo, validation
icon: checkmark-circle
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public consentAccepted: boolean = false;
        	public recontactOk: boolean = false;
        	public firstName: string = "";
        	public intervieweeEmail: string = "";
        	public photoDataUrl: string = "";
        	public validationError: string = "";
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.ensureInterviewStore) { return app.ensureInterviewStore(this); }
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return app && app.getInterviewStore ? app.getInterviewStore() : null;
        	}
        	public async loadStep(): Promise<void> {
        		const store = await this.ensureStore();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || iv.format !== "salon") { return; }
        		this.consentAccepted = !!iv.consentAccepted;
        		this.recontactOk = !!iv.recontactOk;
        		this.firstName = iv.firstName || "";
        		this.intervieweeEmail = iv.intervieweeEmail || "";
        		this.photoDataUrl = iv.photoDataUrl || "";
        		this.validationError = "";
        	}
        	public async handlePhotoCapture(out: any): Promise<void> {
        		let raw = "";
        		if (out != null && out !== undefined) {
        			if (typeof out === "string") { raw = out; }
        			else if (typeof out === "object") { raw = out.dataURI || out.dataUrl || out.href || out.path || ""; }
        		}
        		raw = (raw || "").trim();
        		if (!raw) { return; }
        		const imageUrl = raw.indexOf("data:") === 0 ? raw : "data:image/jpeg;base64," + raw;
        		this.photoDataUrl = imageUrl;
        		const st = await this.ensureStore();
        		if (st) { st.updateSalonDraft({ photoDataUrl: imageUrl }); }
        	}
        	public async showToast(msg: string): Promise<void> {
        		const toastCtrl = this.getInstance(ToastController);
        		const toast = await toastCtrl.create({ message: msg, duration: 2800, position: "bottom" });
        		await toast.present();
        	}
        	public getStoreSync(): any {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        	}
        	public commitSubmit(): void {
        		this.validationError = "";
        		const store = this.getStoreSync();
        		if (!store) {
        			this.validationError = "Store non disponible.";
        			return;
        		}
        		if (store._page !== this) { store._page = this; }
        		const iv = store.getActiveInterview();
        		if (!iv || iv.format !== "salon") {
        			this.validationError = "Aucune fiche active.";
        			return;
        		}
        		if (!(iv.sheetCode || "").trim()) {
        			this.validationError = "Le code fiche est obligatoire (étape 1).";
        			return;
        		}
        		const verbatim = ((iv.verbatimText || "").trim());
        		if (!verbatim) {
        			this.validationError = "Le verbatim est obligatoire (étape 2).";
        			return;
        		}
        		if (!this.consentAccepted) {
        			this.validationError = "Veuillez accepter le consentement RGPD.";
        			return;
        		}
        		const email = (this.intervieweeEmail || "").trim();
        		if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        			this.validationError = "Adresse e-mail invalide.";
        			return;
        		}
        		store.updateSalonDraft({
        			consentAccepted: true,
        			recontactOk: !!this.recontactOk,
        			firstName: (this.firstName || "").trim(),
        			intervieweeEmail: email,
        			photoDataUrl: this.photoDataUrl || "",
        			wizardStep: 4
        		});
        		store.completeSalonInterview();
        	}
        	public commitBack(): void {
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			consentAccepted: !!this.consentAccepted,
        			recontactOk: !!this.recontactOk,
        			firstName: (this.firstName || "").trim(),
        			intervieweeEmail: (this.intervieweeEmail || "").trim(),
        			photoDataUrl: this.photoDataUrl || "",
        			wizardStep: 3
        		});
        	}
        	/*End_c8o_PageFunction*/'
