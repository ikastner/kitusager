comment: Wizard salon — étape 3/4 profil usager
icon: person
scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public sector: string = "";
        	public age: string = "";
        	public urssafSince: string = "";
        	public multiProfile: boolean | null = null;
        	public profileCount: string = "";
        	public contactMode: string = "";
        	public wizardCanProceed: boolean = false;
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.ensureInterviewStore) { return app.ensureInterviewStore(this); }
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return app && app.getInterviewStore ? app.getInterviewStore() : null;
        	}
        	public async loadStep(): Promise<void> {
        		const store = await this.ensureStore();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || iv.format !== "salon") { return; }
        		this.sector = iv.sector || "";
        		this.age = iv.age || "";
        		this.urssafSince = iv.urssafSince || "";
        		this.multiProfile = iv.multiProfile;
        		this.profileCount = iv.profileCount || "";
        		this.contactMode = iv.contactMode || "";
        	}
        	public setMultiProfile(val: boolean): void {
        		this.multiProfile = val;
        		if (!val) { this.profileCount = ""; }
        	}
        	public setContactMode(mode: string): void {
        		this.contactMode = mode;
        	}
        	public getStoreSync(): any {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        	}
        	public commitStep4(): void {
        		this.wizardCanProceed = false;
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			sector: this.sector || "",
        			age: this.age || "",
        			urssafSince: this.urssafSince || "",
        			multiProfile: this.multiProfile,
        			profileCount: this.profileCount || "",
        			contactMode: this.contactMode || "",
        			wizardStep: 5
        		});
        		this.wizardCanProceed = true;
        	}
        	public skipStep(): void {
        		this.wizardCanProceed = false;
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		this.sector = "";
        		this.age = "";
        		this.urssafSince = "";
        		this.multiProfile = null;
        		this.profileCount = "";
        		this.contactMode = "";
        		store.updateSalonDraft({
        			sector: "",
        			age: "",
        			urssafSince: "",
        			multiProfile: null,
        			profileCount: "",
        			contactMode: "",
        			wizardStep: 5
        		});
        		this.wizardCanProceed = true;
        	}
        	public commitBack(): void {
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			sector: this.sector || "",
        			age: this.age || "",
        			urssafSince: this.urssafSince || "",
        			multiProfile: this.multiProfile,
        			profileCount: this.profileCount || "",
        			contactMode: this.contactMode || "",
        			wizardStep: 3
        		});
        	}
        	public ynClass(val: boolean): string {
        		return "vu-toggle-chip" + (this.multiProfile === val ? " vu-toggle-chip--on" : "");
        	}
        	public contactClass(mode: string): string {
        		return "vu-satisfaction-option" + (this.contactMode === mode ? " vu-satisfaction-option--on" : "");
        	}
        	public getFicheLabel(): string {
        		const store = this.getStoreSync();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || !iv.sheetCode || iv.sheetCode === "F-") { return ""; }
        		return iv.sheetCode;
        	}
        	/*End_c8o_PageFunction*/'
