  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public verbatimDraft: string = "";
        	public isRecording: boolean = false;
        	public showMicError: boolean = false;
        	public micErrorMessage: string = "";
        	public previousText: string = "";
        	public wizardCanProceed: boolean = false;
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public async ensureStore(): Promise<any> {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.ensureInterviewStore) { return app.ensureInterviewStore(this); }
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return app && app.getInterviewStore ? app.getInterviewStore() : null;
        	}
        	public async loadStep(): Promise<void> {
        		const store = await this.ensureStore();
        		if (!store) { return; }
        		const iv = store.getActiveInterview();
        		if (!iv || iv.format !== "salon") { return; }
        		this.verbatimDraft = iv.verbatimText || "";
        	}
        	public applySpeechReceived(data: any): void {
        		if (!this.isRecording) { return; }
        		const prefix = this.previousText ? this.previousText.trim() + " " : "";
        		if (data != null && typeof data === "object" && !Array.isArray(data)) {
        			if (data.mode === "snapshot" || "final" in data || "interim" in data) {
        				const committed = (data.final || "").trim();
        				const interim = (data.interim || "").trim();
        				let display = committed;
        				if (interim) {
        					display = (display ? display + " " : "") + interim + " (en cours...)";
        				}
        				this.verbatimDraft = (prefix + display).trim();
        				return;
        			}
        		}
        		const chunk = Array.isArray(data) ? data.join(" ") : String(data != null ? data : "");
        		if (!chunk.trim()) { return; }
        		this.verbatimDraft = (prefix + chunk).trim();
        	}
        	public async showOfflineAlert(): Promise<void> {
        		const alertCtrl = this.getInstance(AlertController);
        		if (!alertCtrl) { return; }
        		const alert = await alertCtrl.create({
        			header: ''Dictée vocale hors connexion'',
        			subHeader: ''Configuration requise'',
        			message: `Pour dicter vos témoignages sans connexion internet, configurez votre appareil Android :<br><br>
        			<b>1.</b> Allez dans les <b>Paramètres</b> de votre appareil.<br>
        			<b>2.</b> Recherchez et sélectionnez <b>Reconnaissance vocale hors connexion</b>.<br>
        			<b>3.</b> Téléchargez la langue <b>Français</b> (vous pouvez utiliser un <b>partage de connexion</b> si vous n''avez pas de Wi-Fi).`,
        			buttons: [''Compris'']
        		});
        		await alert.present();
        	}
        	public async handleSpeechError(e: any): Promise<void> {
        		this.isRecording = false;
        		const msg = (typeof e === "string") ? e : ((e && (e.message || e.error)) ? (e.message || e.error) : String(e));
        		if (msg && (msg.indexOf("not-allowed") >= 0 || msg.indexOf("NotAllowed") >= 0)) {
        			this.micErrorMessage = "Accès micro refusé. Autorisez le microphone pour ce site.";
        		} else if (msg && msg.indexOf("no-speech") >= 0) {
        			this.micErrorMessage = "Aucun son détecté. Parlez après avoir démarré la dictée.";
        		} else {
        			this.micErrorMessage = "Erreur dictée : " + (msg || "inconnue");
        		}
        		this.showMicError = true;
        		this.ref.markForCheck();
        		
        		if (!navigator.onLine || (msg && (msg.indexOf("network") >= 0 || msg.indexOf("connection") >= 0 || msg.indexOf("service") >= 0))) {
        			await this.showOfflineAlert();
        		}
        		
        		setTimeout(() => { this.showMicError = false; this.ref.markForCheck(); }, 3000);
        	}
        	public async toggleRecording(): Promise<void> {
        		if (this.isRecording) {
        			this.global.stopSpeechListening(this);
        			this.isRecording = false;
        			this.verbatimDraft = (this.verbatimDraft || "").replace(/\s*\(en cours...\)$/i, "").trim();
        			return;
        		}
        		this.showMicError = false;
        		this.micErrorMessage = "";
        		try {
        			this.previousText = (this.verbatimDraft || "").trim();
        			await this.global.startSpeechListening(this);
        			this.isRecording = true;
        		} catch (e) {
        			await this.handleSpeechError(e);
        		}
        	}
        	public getStoreSync(): any {
        		const app: any = this.router && this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		return (app && app.getInterviewStore)
        			? app.getInterviewStore()
        			: ((this.global && this.global.interviewStore) || null);
        	}
        	public commitStepVerbatim(): void {
        		this.wizardCanProceed = false;
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			verbatimText: (this.verbatimDraft || "").trim(),
        			wizardStep: 4
        		});
        		this.wizardCanProceed = true;
        	}
        	public commitBack(): void {
        		const store = this.getStoreSync();
        		if (!store) { return; }
        		if (store._page !== this) { store._page = this; }
        		store.updateSalonDraft({
        			verbatimText: (this.verbatimDraft || "").trim(),
        			wizardStep: 2
        		});
        	}
        	public getFicheLabel(): string {
        		const store = this.getStoreSync();
        		const iv = store ? store.getActiveInterview() : null;
        		if (!iv || !iv.sheetCode || iv.sheetCode === "F-") { return ""; }
        		return iv.sheetCode;
        	}
        	/*End_c8o_PageFunction*/'
