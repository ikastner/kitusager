scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public getStore(): any {
        		return this.global.interviewStore;
        	}
        	public async loadHome(): Promise<void> {
        		const app: any = this.router.sharedObject;
        		if (app && app.initVuApp) { app.initVuApp(); }
        		const store = this.getStore();
        		if (store && store.whenReady) { await store.whenReady(); }
        		this.local.interviews = store ? store.listForHome() : [];
        		this.local.recent = (this.local.interviews || []).slice(0, 3);
        		this.local.totalNotes = store ? store.countTotalNotes() : 0;
        	}
        	public goInterview(iv: any): void {
        		if (!iv || !this.getStore()) { return; }
        		this.getStore().resumeInterview(iv);
        		this.angularRouter.navigate(["/interview-active"]);
        	}
        	public async syncAll(): Promise<void> {
        		const store = this.getStore();
        		if (!store) { return; }
        		const n = await store.syncAllPending(this);
        		const toastCtrl = this.getInstance(ToastController);
        		const toast = await toastCtrl.create({
        			message: n > 0 ? (n + " interview(s) synchronisée(s)") : "Aucune interview à synchroniser",
        			duration: 2500,
        			position: "bottom",
        			color: n > 0 ? "success" : "medium"
        		});
        		await toast.present();
        		this.loadHome();
        	}
        	public hasInterviewMeta(iv: any): boolean {
        		return !!(iv && (iv.intervieweeRole || iv.intervieweeCompany));
        	}
        	/*End_c8o_PageFunction*/'
