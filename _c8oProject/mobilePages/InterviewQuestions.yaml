scriptContent: 
  - xmlizable: 
    - ↑classname: com.twinsoft.convertigo.beans.common.FormatedContent
    - com.twinsoft.convertigo.beans.common.FormatedContent: 
      →: |
        '/*Begin_c8o_PageImport*/
        /*End_c8o_PageImport*/
        /*Begin_c8o_PageDeclaration*/
        	public newQuestionInput: string = "";
        	public editingIdx: number = -1;
        	public editValue: string = "";
        	/*End_c8o_PageDeclaration*/
        /*Begin_c8o_PageConstructor*/
        		/*End_c8o_PageConstructor*/
        /*Begin_c8o_PageFunction*/
        	public getStore(): any {
        		return this.global.interviewStore;
        	}
        	public async loadQuestions(): Promise<void> {
        		const store = this.getStore();
        		if (store && store.whenReady) { await store.whenReady(); }
        		this.local.questions = store ? store.getQuestions() : [];
        	}
        	public persistQuestions(): void {
        		const store = this.getStore();
        		if (store) { store.setQuestions(this.local.questions); }
        	}
        	public addQuestion(): void {
        		const t = (this.newQuestionInput || "").trim();
        		if (!t) { return; }
        		this.local.questions.push(t);
        		this.persistQuestions();
        		this.newQuestionInput = "";
        	}
        	public startEdit(idx: number, val: string): void {
        		this.editingIdx = idx;
        		this.editValue = val;
        	}
        	public saveEdit(): void {
        		if (this.editingIdx < 0) { return; }
        		const t = (this.editValue || "").trim();
        		if (t) { this.local.questions[this.editingIdx] = t; }
        		this.persistQuestions();
        		this.editingIdx = -1;
        	}
        	public cancelEdit(): void {
        		this.editingIdx = -1;
        	}
        	public deleteQuestion(idx: number): void {
        		this.local.questions.splice(idx, 1);
        		this.persistQuestions();
        	}
        	/*End_c8o_PageFunction*/'
